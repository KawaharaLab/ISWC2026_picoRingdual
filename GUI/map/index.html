<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR HUD - Portal System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* --- 基本設定 --- */
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .hidden { 
            display: none !important; 
            pointer-events: none !important; /* クリックを完全にスルーさせる */
        }

        .screen {
            position: absolute;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            transition: opacity 0.5s ease;
        }

        /* --- メニュースクリーン (最前面) --- */
        #menu-screen {
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #000;
            /* 追加：visible クラスがない時はクリックを無効にする */
            pointer-events: none; 
        }

        #menu-screen.visible {
            pointer-events: auto;
        }

        .icon-wrapper { display: flex; gap: 50px; align-items: center; }
        .menu-item {
            display: flex; flex-direction: column; align-items: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0.6; transform: scale(0.8);
        }
        .menu-item.selected {
            opacity: 1; transform: scale(1.1);
            filter: drop-shadow(0 0 20px rgba(0, 242, 255, 0.6));
        }
        .menu-item img {
            width: 150px; height: 150px; border-radius: 24px;
            background: #111; border: 1px solid rgba(255,255,255,0.1);
        }
        .label-text {
            margin-top: 20px; font-weight: bold; letter-spacing: 4px;
            font-size: 0.9rem; color: #fff; text-shadow: 0 0 10px rgba(0, 242, 255, 0.8);
        }

        /* --- マップスクリーン --- */
        #map-screen {
            z-index: 1000;
            opacity: 0;
            /* pointer-events: none を削除。ここが原因でクリックが消えていました */
        }

        /* ref.html と同様: ズームモードは地図のズームレベルではなく CSS scale で表現 */
        #zoom-layer {
            width: 100%;
            height: 100%;
            transition: transform 0.1s ease-out;
            transform-origin: center center;
            transform: scale(3);
        }

        #map { width: 100%; height: 100%; z-index: 1; }

        /* Google 側の Polyline / Marker に移したためレガシー SVG は非表示 */
        #overlay-svg,
        #nav-icon {
            display: none !important;
        }

        #map-screen.visible {
            opacity: 1 !important;
            pointer-events: auto !important; /* これが重要 */
        }

        /* --- 重なっているレイヤーの設定 --- */
        #overlay-container {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1001;
            /* 画面全体を覆うレイヤーはクリックを「透過」させる */
            pointer-events: none; 
        }

        /* ステータスボックスだけはクリックを「復活」させる */
        /* マップ用の簡易ステータス（余計な枠を消す） */
        .status-box-simple {
            position: absolute; bottom: 40px; left: 40px;
            pointer-events: none;
        }

        /* ゲート画面のボタンを少し特別に */
        #connection-gate .btn-hud {
            border-color: rgba(0, 242, 255, 0.3);
            background: rgba(0, 242, 255, 0.05);
            letter-spacing: 0.2em;
        }

        /* マップ上のログは邪魔にならないよう極小に */
        #serial-log {
            background: none;
            border: none;
            margin: 0;
            padding: 0;
        }

        /* --- HUDパーツ --- */
        #overlay-svg { width: 100%; height: 100%; position: absolute; }
        .path-line {
            fill: none; stroke: #008cff; stroke-width: 6;
            stroke-linecap: round; stroke-linejoin: round;
            stroke-dasharray: 10, 15; opacity: 0; 
            animation: flow 15s linear infinite;
        }
        @keyframes flow { from { stroke-dashoffset: 250; } to { stroke-dashoffset: 0; } }
        .path-visible { opacity: 0.9; }

        #nav-icon {
            position: absolute; width: 32px; height: 32px;
            display: none; z-index: 1002; transform-origin: center center;
        }

        .btn-hud {
            display: block; width: 100%; padding: 10px;
            background: rgba(0, 242, 255, 0.15);
            color: #00f2ff; border: 1px solid #00f2ff;
            border-radius: 6px; font-size: 0.75rem; font-weight: bold;
            cursor: pointer; transition: all 0.2s;
            text-transform: uppercase; text-align: center;
        }
        .btn-hud:hover { background: rgba(0, 242, 255, 0.3); box-shadow: 0 0 15px rgba(0, 242, 255, 0.4); }
        .btn-hud:active { transform: scale(0.97); }

        .visible { opacity: 1 !important; pointer-events: auto !important; }

        .mode-badge {
            display: inline-block; margin-top: 8px; padding: 2px 8px;
            border-radius: 4px; background: #00f2ff; color: #000;
            font-size: 0.7rem; font-weight: 800; text-transform: uppercase;
        }
        .mode-badge.mode-zoom {
            background: #ff3ea5;
            color: #000;
        }

        .hud-panel {
            position: absolute;
            bottom: 40px;
            left: 40px;
            z-index: 1003;
            pointer-events: none; /* 下の地図を操作できるようにするためこれは維持でOK */
            font-family: 'Inter', system-ui, sans-serif;
            max-width: 340px;

            /* --- ここから追加 --- */
            background: rgba(0, 0, 0, 0.6); /* 半透明の黒背景 */
            backdrop-filter: blur(10px);    /* 背面の地図をぼかす（一気にHUDっぽくなります） */
            padding: 20px;                  /* 内側の余白 */
            border-left: 4px solid #00f2ff; /* 左側にアクセントライン */
            border-radius: 0 8px 8px 0;    /* 角を少し丸める */
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5); /* 影をつけて浮かす */
        }

        .hud-panel .hud-title {
            font-weight: 900;
            letter-spacing: -0.02em;
        }

        .hud-panel .hud-instructions {
            margin-top: 10px;
            font-size: 0.6rem;
            line-height: 1.6;
            color: rgba(255,255,255,0.65);
        }

        #serial-log {
            font-family: monospace; font-size: 0.6rem; color: #00f2ff;
            margin-top: 10px; padding: 6px; background: rgba(0,0,0,0.3);
            border-radius: 4px; max-height: 60px; overflow-y: auto;
            opacity: 0.8; border-top: 1px solid rgba(0, 242, 255, 0.1);
        }
    </style>
</head>
<body>
    <div id="connection-gate" class="screen visible flex flex-col justify-center items-center" style="z-index: 3000; background: #000;">
        <div class="mb-10 text-center">
            <h2 class="text-[#00f2ff] text-xs font-bold tracking-[0.5em] mb-2">SYSTEM INITIALIZING</h2>
            <p class="text-gray-500 text-[0.6rem]">CONNECT PERIPHERALS TO START</p>
        </div>
        <div class="flex gap-4">
            <button id="gate-btn-left" class="btn-hud w-40" onclick="connectSerial('LEFT')">LEFT DEVICE</button>
            <button id="gate-btn-right" class="btn-hud w-40" onclick="connectSerial('RIGHT')">RIGHT DEVICE</button>
        </div>
        <div id="gate-status" class="mt-8 text-[0.6rem] text-[#00f2ff] font-mono opacity-50">READY TO CONNECT...</div>
    </div>

    <div id="menu-screen" class="screen">
        <div class="icon-wrapper">
            <div class="menu-item" id="menu-video">
                <img src="movie_icon.png" alt="Video">
                <div class="label-text">VIDEO</div>
            </div>
            <div class="menu-item selected" id="menu-map">
                <img src="map_icon.png" alt="Map">
                <div class="label-text">MAP</div>
            </div>
            <div class="menu-item" id="menu-pdf">
                <img src="pdf_icon.png" alt="PDF">
                <div class="label-text">PDF</div>
            </div>
        </div>
        <div class="mt-16 text-gray-400 text-xs tracking-widest opacity-60 text-center">
            [LEFT / RIGHT] SELECT • [PRESS] START
        </div>
    </div>

    <div id="map-screen" class="screen">
        <div id="zoom-layer">
            <div id="map"></div>
        </div>
        <div id="overlay-container">
            <svg id="overlay-svg"><path id="route-path" class="path-line" d="" /></svg>
            <div id="nav-icon">
                <svg viewBox="0 0 100 100" width="32" height="32"><path fill="#fff" stroke="#008cff" stroke-width="4" d="M50 10 L85 85 L50 70 L15 85 Z" /></svg>
            </div>
            
            <div class="hud-panel">
                <!-- <div id="status-val" class="hud-title text-2xl font-black text-white italic tracking-tighter">READY</div> -->
                <div id="mode-badge" class="mode-badge">MODE: PAN</div>
                <div class="hud-instructions">
                    <div class="font-mono opacity-70">SERIAL CONTROLS</div>
                    <div class="font-mono opacity-70">- scroll: scroll</div>
                    <div class="font-mono opacity-70">- press: toggle mode (PAN/ZOOM)</div>
                </div>
                <!-- <div id="serial-log" class="mt-2 text-[0.5rem] opacity-40">SERIAL: ACTIVE</div> -->
            </div>
        </div>
    </div>

    <script src="./app-state.js"></script>
    <script src="./menu.js"></script>
    <script src="./map.js"></script>
    <script src="./serial.js"></script>
    <script src="./app.js"></script>
</body>
</html>
